<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMD Medical | Katihar Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="container header-layout">
            <div class="header-left-empty" style="display: flex; gap: 10px;">
                <button onclick="showHistory()" class="history-btn" title="Old Orders">
                    <i class="fas fa-history"></i>
                </button>
                <button onclick="openAdmin()" class="history-btn" style="color: #ff9800;" title="Admin Login">
                    <i class="fas fa-user-lock"></i>
                </button>
            </div>

            <div class="header-center">
                <h1 class="brand-name">J.M.D. MEDICAL</h1>
                <span class="brand-sub">Binodpur, Katihar, Bihar 854105</span>
            </div>
            
            <div class="header-right-tools">
                <div id="live-clock" class="clock-display">00:00:00 PM</div>
                <div class="cart-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-badge">0</span>
                </div>
            </div>
        </div>
    </header>

    <section class="hero-search">
        <div class="container">
            <h1> Online Order Now </h1>
            <p>Trusted Pharmacy in Binodpur</p>
            
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Medicine ka naam likhein..." onkeyup="searchMedicine()">
            </div>

            <div class="category-container">
                <button class="cat-chip active" onclick="filterCategory('all', this)">All</button>
                <button class="cat-chip" onclick="filterCategory('TAB', this)">Tablets</button>
                <button class="cat-chip" onclick="filterCategory('SYP', this)">Syrups</button>
                <button class="cat-chip" onclick="filterCategory('INJ', this)">Injections</button>
                <button class="cat-chip" onclick="filterCategory('CAP', this)">Capsules</button>
            </div>
        </div>
    </section>

    <main class="container">
        <div class="stock-header">
            <h2>Inventory Stock</h2>
            <div class="legend">
                <span class="dot green"></span> Safe
                <span class="dot orange"></span> Low
                <span class="dot red"></span> Out
            </div>
        </div>
        
        <div id="medList" class="med-grid"></div>

        <div style="text-align: center; margin-top: 30px; margin-bottom: 50px;">
            <button id="showMoreBtn" onclick="showAllMeds()" class="add-btn" style="width: 250px; background-color: #0056b3; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600;">
                Show More Medicines
            </button>
        </div>
    </main>

    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-basket"></i> Your Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cartItems" class="cart-items-list">
            <p style="text-align:center; padding:20px; color:#888;">Cart khali hai...</p>
        </div>
        <div class="cart-footer">
            <div class="total-row" style="display: flex; justify-content: space-between; padding: 15px; font-weight: bold; border-top: 1px solid #eee;">
                <span>Total Amount:</span>
                <span style="color: #28a745;">₹<span id="cartTotal">0.00</span></span>
            </div>
            <button class="whatsapp-btn" onclick="sendWhatsAppOrder()" style="width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 0 0 15px 15px; cursor: pointer; font-weight: bold;">
                <i class="fab fa-whatsapp"></i> Order on WhatsApp
            </button>
        </div>
    </div>

    <div id="adminModal" class="history-modal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
        <div class="history-content" style="background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px;">
            <div class="cart-header" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
                <span onclick="closeAdmin()" style="cursor:pointer; font-size:24px;">&times;</span>
            </div>
            <div id="adminAuth">
                <p>User ID:</p>
                <input type="text" id="adminUser" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
                <p>Password:</p>
                <input type="password" id="adminPass" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
                <button onclick="loginAdmin()" class="whatsapp-btn" style="width:100%; background:#007bff;">Login</button>
            </div>
            <div id="adminControls" style="display:none;">
                <p>Select Medicine:</p>
                <select id="medSelect" style="width:100%; padding:10px; margin-bottom:15px;"></select>
                <p>Add Quantity:</p>
                <input type="number" id="newStockQty" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd;">
                <button onclick="updateStockNow()" class="whatsapp-btn" style="width:100%;">Update Stock</button>
                <hr style="margin:20px 0;">
                <button onclick="resetAllStock()" style="width:100%; background:#dc3545; color: white; padding: 10px; border:none; border-radius:8px;">Factory Reset Data</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="history-modal" style="display:none;">
        <div class="history-content">
            <div class="cart-header">
                <h3>Recent Orders</h3>
                <span onclick="closeHistory()" style="cursor:pointer; font-size:24px;">&times;</span>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
